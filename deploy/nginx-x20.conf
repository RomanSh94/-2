# X20 dashboard — nginx reverse proxy с TLS.
# Дашборд слушает только 127.0.0.1:8080; наружу его публикует ТОЛЬКО этот прокси
# поверх HTTPS. Заполни server_name своим доменом перед применением.
#
# Применение: см. deploy/setup_https.sh (ставит certbot и выпускает сертификат).
# Не забудь открыть порт 443 в Hetzner firewall.

server {
    listen 80;
    server_name DASHBOARD_DOMAIN;          # <- замени на свой домен
    # Сертификат certbot пропишет автоматически; HTTP редиректит на HTTPS.
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name DASHBOARD_DOMAIN;          # <- замени на свой домен

    # ssl_certificate / ssl_certificate_key добавит certbot.

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
